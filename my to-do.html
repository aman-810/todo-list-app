<html>
<head>
  <title>to do list</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <style>
  h2{
    text-align:center;
    margin-top:30px;
  }
  body{
    background:linear-gradient(#CDDFF0,#EDF4FC);
  }
  .main{
    min-height:200px;
    width:400px;
    background:white;
    margin:30px auto;
    box-sizing:border-box;
    border-radius:10px;
    box-shadow:3px 3px 20px black;
    padding:10px 11px;
  }
  .addbtn{
    color:white;
    background:#247AD5;
    border:none;
    border-radius:5px;
    box-sizing:border-box;
    padding:10px 15px;
    font-size:17px;
    font-weight:bold;
  }
  #text{
    border:2px solid gray;
    border-radius:5px;
    padding:10px 15px;
    box-sizing:border-box;
    font-size:14px;
    font-weight:bold;
    color:gray;
    margin-right:7px;
  }
  .newDivStyle{
    color:black;
    border:2px solid black;
    border-radius:5px;
    background:aqua;
    box-sizing:border-box;
    padding:1px 4px;
    margin:15px 0px;
    font-weight:bold;
    font-size:18px;
  }
  .delBtnStyle{
    color:white;
    background:red;
    border:none;
    float:right;
    margin-top:-47px;
    font-size:18px;
    font-weight:bold;
    padding:5px 7px;
    box-sizing:border-box;
    border-radius:5px;
    border:1px solid black;
  }
  .editBtnStyle{
    color:white;
    background:#3498db;
    border:none;
    float:right;
    border:1px solid black;
    margin-top:-47px;
    margin-right:80px;
    font-size:18px;
    font-weight:bold;
    padding:5px 7px;
    box-sizing:border-box;
    border-radius:5px;    
  }
  </style>  
</head>
<body>
  <h2>My To-Do List</h2>
  <div class='main'>
    <input type="text" id="text"
      placeholder="Add a new Task"/>
    <button class='addbtn'>Add Task</button>
  </div>
  <script>
  let mainDiv=document.querySelector('.main');
  let taskText=document.querySelector('#text');
  let btn=document.querySelector('button');
  btn.addEventListener('click',createDiv);
  function createDiv()
  {
    if(taskText.value=='')
    {
      alert('Please enter task');
    }
    else{
      let newDiv=document.createElement('div');
      mainDiv.append(newDiv);
      let para=document.createElement('p');
      newDiv.append(para);
      para.innerText=taskText.value;
      newDiv.classList.add('newDivStyle');
      taskText.value='';
      let delBtn=document.createElement('button');
      newDiv.append(delBtn);
      delBtn.innerText='Delete';
      delBtn.classList.add('delBtnStyle');
      delBtn.addEventListener('click',()=>{
        newDiv.remove();
      });
      let editBtn=document.createElement('button');
      newDiv.append(editBtn);
      editBtn.innerText='Edit';
      editBtn.classList.add('editBtnStyle');
      editBtn.addEventListener('click',()=>{
        taskText.value=para.innerText;
        newDiv.remove();
      });
      
    }
  }
  </script>
</body>
</html>
